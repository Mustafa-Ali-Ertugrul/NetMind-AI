services:
  db:
    image: postgres:16-alpine
    container_name: netmind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netmind}
      POSTGRES_USER: ${POSTGRES_USER:-netmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netmind}
    volumes:
      - netmind_db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netmind} -d ${POSTGRES_DB:-netmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - netmind-net

  redis:
    image: redis:7-alpine
    container_name: netmind-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - netmind-net

  minio:
    image: minio/minio:RELEASE.2026-05-21T23-49-35Z
    container_name: netmind-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-netmind}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-netmind-secret}
    volumes:
      - netmind_minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - netmind-net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: netmind-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-netmind}:${POSTGRES_PASSWORD:-netmind}@db:5432/${POSTGRES_DB:-netmind}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBJECT_STORE_BACKEND: s3
      S3_ENDPOINT_URL: minio:9000
      S3_BUCKET: ${S3_BUCKET:-netmind-pcaps}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-netmind}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-netmind-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - netmind_pcap_data:/var/lib/netmind/pcaps
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - netmind-net

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-netmind}:${POSTGRES_PASSWORD:-netmind}@db:5432/${POSTGRES_DB:-netmind}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBJECT_STORE_BACKEND: s3
      S3_ENDPOINT_URL: minio:9000
      S3_BUCKET: ${S3_BUCKET:-netmind-pcaps}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-netmind}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-netmind-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      NETMIND_AI_CACHE_REDIS_URL: redis://redis:6379/2
    volumes:
      - netmind_pcap_data:/var/lib/netmind/pcaps
    networks:
      - netmind-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: netmind-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - netmind-net

volumes:
  netmind_db_data:
    name: netmind_db_data
  netmind_pcap_data:
    name: netmind_pcap_data
  netmind_minio_data:
    name: netmind_minio_data

networks:
  netmind-net:
    name: netmind-net
    driver: bridge
