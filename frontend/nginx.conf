server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 110m;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # ── API reverse proxy ────────────────────────────────────
    # Proxies /api/* -> api:8000 (Docker compose service name).
    # The Axios client uses baseURL=/api/v1, so a request to
    # /api/v1/pcaps reaches api:8000/api/v1/pcaps.
    # NOTE: $api_backend is a variable so nginx defers DNS
    #       resolution to runtime; this keeps nginx -t passing
    #       even when the upstream isn't resolvable yet.
    location /api/ {
        set $api_backend "http://api:8000";
        proxy_pass $api_backend;

        proxy_http_version 1.1;
        proxy_set_header Host                   $host;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── Immutable asset caching ──────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ─────────────────────────────────────────
    # Every non-asset path serves index.html so React Router
    # handles /upload, /jobs/:id, /storage, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
